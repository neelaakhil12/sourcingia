<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&amp;family=Poppins:wght@500&amp;display=swap');
      .title {
        font-family: 'Cinzel', Georgia, serif;
        font-size: 38px;
        font-weight: 600;
        fill: #D4AF37;
        letter-spacing: 4px;
      }
      .subtitle {
        font-family: 'Poppins', sans-serif;
        font-size: 9px;
        font-weight: 500;
        fill: #D4AF37;
        letter-spacing: 3.5px;
      }
      .line {
        stroke: #D4AF37;
        stroke-width: 1;
        opacity: 0.6;
      }
      .diamond {
        fill: #D4AF37;
      }
    </style>
  </defs>
  <!-- SOURCINGIA Text -->
  <text x="50%" y="36" text-anchor="middle" class="title">SOURCINGIA</text>
  
  <!-- Divider line with diamond -->
  <line x1="10" y1="48" x2="185" y2="48" class="line" />
  <polygon points="200,44 204,48 200,52 196,48" class="diamond" />
  <line x1="215" y1="48" x2="390" y2="48" class="line" />
  
  <!-- Subtitle Text -->
  <text x="50%" y="68" text-anchor="middle" class="subtitle">MANAGEMENT SERVICES PRIVATE LIMITED</text>
</svg>
